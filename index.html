<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Soccer</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      touch-action: none;
      background: #000;
    }

    /* Force the A-Frame canvas + video to fill the full phone screen */
    a-scene, canvas.a-canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
    }

    /* AR.js puts the camera feed in a <video> — make it cover the screen */
    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    #ui {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      pointer-events: none;
      white-space: nowrap;
    }

    #score-board {
      position: fixed;
      top: calc(max(12px, env(safe-area-inset-top)) + 48px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,100,0,0.85);
      color: white;
      padding: 8px 24px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      display: none;
      text-align: center;
    }

    #swipe-hint {
      position: fixed;
      bottom: max(36px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      color: rgba(255,255,255,0.9);
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      display: none;
      pointer-events: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      animation: bounce 1.4s infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-8px); }
    }

    #trail-canvas {
      position: fixed;
      inset: 0;
      z-index: 998;
      pointer-events: none;
    }

    #goal-flash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 72px;
      font-weight: 900;
      color: gold;
      text-shadow: 0 0 40px orange, 0 0 80px red;
      background: rgba(0,0,0,0.35);
      pointer-events: none;
    }
    @keyframes flashIn {
      0%   { opacity: 0; transform: scale(0.5); }
      30%  { opacity: 1; transform: scale(1.15); }
      70%  { opacity: 1; transform: scale(1.0); }
      100% { opacity: 0; transform: scale(1.2); }
    }

    #miss-flash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 52px;
      font-weight: 900;
      color: #ff4444;
      text-shadow: 0 0 20px red;
      background: rgba(0,0,0,0.2);
      pointer-events: none;
    }
    @keyframes missIn {
      0%   { opacity: 0; transform: scale(0.7); }
      30%  { opacity: 1; transform: scale(1.05); }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>

<body>

<canvas id="trail-canvas"></canvas>
<div id="ui">📷 Point camera at Hiro marker</div>
<div id="score-board">⚽ Goals: <span id="score">0</span></div>
<div id="swipe-hint">👆 Swipe UP to kick!</div>
<div id="goal-flash">⚽ GOAL! 🎉</div>
<div id="miss-flash">😬 Miss!</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
  arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
  style="position:fixed;top:0;left:0;width:100vw;height:100vh;"
>
  <a-marker preset="hiro" id="hiro-marker">

    <!-- Grass -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="4" height="6"
      material="color: #2d8c2d; opacity: 0.65; transparent: true"></a-plane>

    <!-- Center circle -->
    <a-ring position="0 0.01 0" rotation="-90 0 0"
      radius-inner="0.45" radius-outer="0.5"
      material="color: white; opacity: 0.55; transparent: true"></a-ring>

    <!-- Goal posts -->
    <a-cylinder position="-0.75 0.5 -2" radius="0.04" height="1" material="color: white"></a-cylinder>
    <a-cylinder position=" 0.75 0.5 -2" radius="0.04" height="1" material="color: white"></a-cylinder>
    <a-box position="0 0.98 -2" width="1.54" height="0.05" depth="0.05" material="color: white"></a-box>

    <!-- Net -->
    <a-plane position="0 0.5 -2.08" width="1.5" height="1"
      material="color: #cccccc; opacity: 0.22; transparent: true; side: double"></a-plane>
    <a-box position="0 0.25 -2.08" width="1.5" height="0.01" depth="0.01" material="color:white;opacity:0.4;transparent:true"></a-box>
    <a-box position="0 0.50 -2.08" width="1.5" height="0.01" depth="0.01" material="color:white;opacity:0.4;transparent:true"></a-box>
    <a-box position="0 0.75 -2.08" width="1.5" height="0.01" depth="0.01" material="color:white;opacity:0.4;transparent:true"></a-box>
    <a-box position="-0.5 0.5 -2.08" width="0.01" height="1" depth="0.01" material="color:white;opacity:0.4;transparent:true"></a-box>
    <a-box position=" 0   0.5 -2.08" width="0.01" height="1" depth="0.01" material="color:white;opacity:0.4;transparent:true"></a-box>
    <a-box position=" 0.5 0.5 -2.08" width="0.01" height="1" depth="0.01" material="color:white;opacity:0.4;transparent:true"></a-box>
    <a-box position="0 0.01 -1.5" width="1.5" height="0.01" depth="0.01" material="color:white;opacity:0.5;transparent:true"></a-box>

    <!-- Soccer ball -->
    <a-sphere id="soccer-ball" position="0 0.18 0.5" radius="0.18"
      material="color: white; roughness: 0.5" shadow>
      <a-dodecahedron position="0 0 0" radius="0.185"
        material="color: #111; wireframe: true; opacity: 0.5; transparent:true"></a-dodecahedron>
    </a-sphere>

    <!-- Ball shadow -->
    <a-circle id="ball-shadow" position="0 0.005 0.5" rotation="-90 0 0"
      radius="0.16" material="color: black; opacity: 0.25; transparent: true"></a-circle>

  </a-marker>

  <!-- wider FOV suits phone portrait mode -->
  <a-entity camera fov="80" look-controls="enabled: false"></a-entity>
</a-scene>

<script>
  let score = 0;
  let ballInFlight = false;
  let markerVisible = false;

  const ui         = document.getElementById('ui');
  const scoreBoard = document.getElementById('score-board');
  const scoreEl    = document.getElementById('score');
  const goalFlash  = document.getElementById('goal-flash');
  const missFlash  = document.getElementById('miss-flash');
  const swipeHint  = document.getElementById('swipe-hint');
  const ball       = document.getElementById('soccer-ball');
  const shadow     = document.getElementById('ball-shadow');
  const marker     = document.getElementById('hiro-marker');

  // ── Marker ────────────────────────────────────────────
  marker.addEventListener('markerFound', () => {
    markerVisible = true;
    ui.textContent = '✅ Swipe UP anywhere to kick!';
    swipeHint.style.display = 'block';
    scoreBoard.style.display = 'block';
  });
  marker.addEventListener('markerLost', () => {
    markerVisible = false;
    ui.textContent = '📷 Point camera at Hiro marker';
    swipeHint.style.display = 'none';
  });

  // ── Trail canvas ──────────────────────────────────────
  const canvas = document.getElementById('trail-canvas');
  const ctx    = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  let trailPoints = [];

  function drawTrail() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (trailPoints.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(trailPoints[0].x, trailPoints[0].y);
    for (let i = 1; i < trailPoints.length; i++) {
      ctx.lineTo(trailPoints[i].x, trailPoints[i].y);
    }
    ctx.strokeStyle = 'rgba(255, 200, 0, 0.75)';
    ctx.lineWidth   = 7;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.stroke();
  }

  function clearTrail() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    trailPoints = [];
  }

  // ── Touch ─────────────────────────────────────────────
  let touchStartX = 0, touchStartY = 0;
  let touchLastX  = 0, touchLastY  = 0;
  let isSwiping   = false;

  document.addEventListener('touchstart', (e) => {
    if (!markerVisible || ballInFlight) return;
    const t = e.touches[0];
    touchStartX = touchLastX = t.clientX;
    touchStartY = touchLastY = t.clientY;
    isSwiping   = true;
    trailPoints = [{ x: t.clientX, y: t.clientY }];
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!isSwiping) return;
    const t = e.touches[0];
    touchLastX = t.clientX;
    touchLastY = t.clientY;
    trailPoints.push({ x: t.clientX, y: t.clientY });
    drawTrail();
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!isSwiping || !markerVisible || ballInFlight) {
      isSwiping = false;
      clearTrail();
      return;
    }
    isSwiping = false;

    const dx = touchLastX - touchStartX;
    const dy = touchLastY - touchStartY; // negative = upward swipe

    const swipeDist = Math.sqrt(dx * dx + dy * dy);
    const isUpward  = dy < -40;

    setTimeout(clearTrail, 250);

    if (swipeDist < 40 || !isUpward) return; // ignored: too short or not upward

    // Horizontal aim: where on screen the swipe started
    const screenW  = window.innerWidth;
    const centerX  = screenW / 2;
    const offsetX  = touchStartX - centerX;             // px from center
    const xDrift   = (offsetX / (screenW * 0.42)) * 0.75; // normalise → ±0.75

    // Power from swipe length, capped at 1
    const power = Math.min(swipeDist / 280, 1.0);

    kickBall(xDrift, power);
  }, { passive: true });

  // ── Kick ─────────────────────────────────────────────
  function kickBall(xDrift, power) {
    if (ballInFlight) return;
    ballInFlight = true;
    swipeHint.style.display = 'none';

    // Goal posts sit at x ±0.75 world units
    const worldX = xDrift * 1.1;
    const isGoal  = Math.abs(worldX) < 0.70 && power > 0.18;

    const startPos = { x: 0,             y: 0.18,                z:  0.5 };
    const peakPos  = { x: worldX * 0.45, y: 0.5 + power * 0.75, z: -0.6 };
    const endPos   = { x: worldX,        y: isGoal ? 0.42 : 0.05, z: -2.3 };

    const duration  = 700 + power * 250;
    const startTime = performance.now();

    function animate(now) {
      const t  = Math.min((now - startTime) / duration, 1);
      const e2 = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; // ease in-out quad
      const mt = 1 - e2;

      const x = mt*mt*startPos.x + 2*mt*e2*peakPos.x + e2*e2*endPos.x;
      const y = mt*mt*startPos.y + 2*mt*e2*peakPos.y + e2*e2*endPos.y;
      const z = mt*mt*startPos.z + 2*mt*e2*peakPos.z + e2*e2*endPos.z;

      ball.setAttribute('position', `${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`);
      const spin = e2 * 720;
      ball.setAttribute('rotation', `${spin} ${(spin * 0.3).toFixed(1)} 0`);

      const sScale = Math.max(0.15, 1 - y * 0.85);
      shadow.setAttribute('position', `${x.toFixed(3)} 0.005 ${z.toFixed(3)}`);
      shadow.setAttribute('scale', `${sScale} ${sScale} 1`);

      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        onLanded(isGoal);
      }
    }
    requestAnimationFrame(animate);
  }

  function onLanded(isGoal) {
    if (isGoal) {
      score++;
      scoreEl.textContent = score;
      showFlash(goalFlash, 'flashIn', 1800);
    } else {
      showFlash(missFlash, 'missIn', 1100);
    }
    setTimeout(() => {
      ball.setAttribute('position', '0 0.18 0.5');
      ball.setAttribute('rotation', '0 0 0');
      shadow.setAttribute('position', '0 0.005 0.5');
      shadow.setAttribute('scale', '1 1 1');
      ballInFlight = false;
      if (markerVisible) swipeHint.style.display = 'block';
    }, isGoal ? 2000 : 900);
  }

  function showFlash(el, animName, ms) {
    el.style.display   = 'flex';
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = `${animName} ${ms}ms ease forwards`;
    setTimeout(() => { el.style.display = 'none'; }, ms);
  }
</script>

</body>
</html>
