<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AR Soccer</title>

  <script src="https://unpkg.com/aframe@1.2.0/dist/aframe.min.js"></script>
  <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; color: #fff; font-family: Arial, sans-serif; }
    #ui { position: fixed; top: 16px; left: 16px; z-index: 999; background: rgba(0,0,0,0.7); padding: 10px 14px; border-radius: 18px; font-size: 14px; }
    #score-board { position: fixed; top: 16px; right: 16px; z-index: 999; background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 18px; font-size: 18px; font-weight: 700; }
  </style>
</head>
<body>

<div id="ui">Find the Hiro marker</div>
<div id="score-board">Score: <span id="score">0</span></div>

<a-scene
  vr-mode-ui="enabled: false"
  renderer="antialias: true; alpha: true"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
>
  <a-marker preset="hiro" id="hiro-marker">
    <a-entity scale="0.5 0.5 0.5">

      <!-- Field -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="2" height="3"
        material="color:#2d8c2d; opacity:0.75; transparent:true"></a-plane>

      <!-- Centre circle -->
      <a-ring position="0 0.01 0.3" rotation="-90 0 0"
        radius-inner="0.28" radius-outer="0.32"
        material="color:white; opacity:0.6; transparent:true"></a-ring>

      <!-- Halfway line -->
      <a-box position="0 0.01 0.3" width="2" height="0.01" depth="0.02"
        material="color:white; opacity:0.5; transparent:true"></a-box>

      <!-- Goal posts -->
      <a-cylinder position="-0.4 0.25 -1.2" radius="0.03" height="0.5" material="color:white"></a-cylinder>
      <a-cylinder position=" 0.4 0.25 -1.2" radius="0.03" height="0.5" material="color:white"></a-cylinder>
      <a-box position="0 0.49 -1.2" width="0.84" height="0.04" depth="0.04" material="color:white"></a-box>

      <!-- Net -->
      <a-plane position="0 0.25 -1.26" width="0.8" height="0.5"
        material="color:#ddd; opacity:0.2; transparent:true; side:double"></a-plane>
      <a-box position="0 0.12 -1.26" width="0.8" height="0.01" depth="0.01" material="color:white;opacity:0.35;transparent:true"></a-box>
      <a-box position="0 0.25 -1.26" width="0.8" height="0.01" depth="0.01" material="color:white;opacity:0.35;transparent:true"></a-box>
      <a-box position="0 0.38 -1.26" width="0.8" height="0.01" depth="0.01" material="color:white;opacity:0.35;transparent:true"></a-box>
      <a-box position="-0.27 0.25 -1.26" width="0.01" height="0.5" depth="0.01" material="color:white;opacity:0.35;transparent:true"></a-box>
      <a-box position="     0 0.25 -1.26" width="0.01" height="0.5" depth="0.01" material="color:white;opacity:0.35;transparent:true"></a-box>
      <a-box position=" 0.27 0.25 -1.26" width="0.01" height="0.5" depth="0.01" material="color:white;opacity:0.35;transparent:true"></a-box>
      <a-box position="0 0.01 -0.95" width="0.8" height="0.01" depth="0.01" material="color:white;opacity:0.5;transparent:true"></a-box>

      <!-- Soccer ball -->
      <a-sphere id="soccer-ball" position="0 0.12 0.3" radius="0.12"
        material="color:white; roughness:0.4">
        <a-icosahedron radius="0.125"
          material="color:#111; wireframe:true; opacity:0.7; transparent:true"></a-icosahedron>
      </a-sphere>
      <a-circle id="ball-shadow" position="0 0.003 0.3" rotation="-90 0 0"
        radius="0.10" material="color:black; opacity:0.3; transparent:true"></a-circle>

    </a-entity>
  </a-marker>

  <a-entity camera look-controls="enabled:false"></a-entity>
</a-scene>

<script>
  const ui      = document.getElementById('ui');
  const scoreEl = document.getElementById('score');
  const ball    = document.getElementById('soccer-ball');
  const shadow  = document.getElementById('ball-shadow');
  const marker  = document.getElementById('hiro-marker');

  let score = 0, ballInFlight = false, markerVisible = false;
  let swipeActive = false, startX = 0, startY = 0, currentX = 0, currentY = 0;

  marker.addEventListener('markerFound', () => { markerVisible = true;  ui.textContent = 'Swipe up to kick ⬆️'; });
  marker.addEventListener('markerLost',  () => { markerVisible = false; ui.textContent = 'Find the Hiro marker'; });

  function beginSwipe(x, y) {
    if (!markerVisible || ballInFlight) return;
    swipeActive = true; startX = currentX = x; startY = currentY = y;
  }
  function moveSwipe(x, y) { if (swipeActive) { currentX = x; currentY = y; } }
  function endSwipe() {
    if (!swipeActive || !markerVisible || ballInFlight) { swipeActive = false; return; }
    swipeActive = false;
    const dx = currentX - startX, dy = currentY - startY;
    const dist = Math.hypot(dx, dy);
    if (dist < 40 || dy > -40) return;
    kickBall(((startX - window.innerWidth / 2) / (window.innerWidth * 0.42)) * 0.75, Math.min(dist / 280, 1));
  }

  document.addEventListener('touchstart', e => beginSwipe(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  document.addEventListener('touchmove',  e => moveSwipe(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  document.addEventListener('touchend',   endSwipe, { passive: true });
  document.addEventListener('mousedown',  e => beginSwipe(e.clientX, e.clientY));
  document.addEventListener('mousemove',  e => moveSwipe(e.clientX, e.clientY));
  document.addEventListener('mouseup',    endSwipe);

  function kickBall(xDrift, power) {
    ballInFlight = true;
    ui.textContent = 'Kicked…';
    const worldX = xDrift * 0.6;
    const isGoal = Math.abs(worldX) < 0.38 && power > 0.18;
    const s = { x: 0,            y: 0.12, z:  0.30 };
    const p = { x: worldX * 0.4, y: 0.35 + power * 0.4, z: -0.4 };
    const e = { x: worldX,       y: isGoal ? 0.22 : 0.03, z: -1.4 };
    const dur = 700 + power * 250, t0 = performance.now();

    function animate(now) {
      const t  = Math.min((now - t0) / dur, 1);
      const ea = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      const iv = 1 - ea;
      const x = iv*iv*s.x + 2*iv*ea*p.x + ea*ea*e.x;
      const y = iv*iv*s.y + 2*iv*ea*p.y + ea*ea*e.y;
      const z = iv*iv*s.z + 2*iv*ea*p.z + ea*ea*e.z;
      ball.setAttribute('position', `${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`);
      ball.setAttribute('rotation', `${(ea*720).toFixed(1)} ${(ea*216).toFixed(1)} 0`);
      const ss = Math.max(0.15, 1 - y * 0.85);
      shadow.setAttribute('position', `${x.toFixed(3)} 0.003 ${z.toFixed(3)}`);
      shadow.setAttribute('scale', `${ss} ${ss} 1`);
      if (t < 1) requestAnimationFrame(animate); else onLanding(isGoal);
    }
    requestAnimationFrame(animate);
  }

  function onLanding(isGoal) {
    if (isGoal) {
      score++;
      scoreEl.textContent = score;
      ui.textContent = 'Swipe up to kick ⬆️';
    } else {
      ui.textContent = 'Miss!';
    }
    setTimeout(() => {
      ball.setAttribute('position', '0 0.12 0.3');
      ball.setAttribute('rotation', '0 0 0');
      shadow.setAttribute('position', '0 0.003 0.3');
      shadow.setAttribute('scale', '1 1 1');
      ballInFlight = false;
      if (markerVisible) ui.textContent = 'Swipe up to kick ⬆️';
    }, isGoal ? 1200 : 800);
  }
</script>
</body>
</html>
